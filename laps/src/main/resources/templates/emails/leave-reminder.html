<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Leave Reminder</title>
</head>
<body>
    <p>Dear Manager,</p>

    <p>This is a reminder that <strong th:text="${employee}"></strong> has a pending leave application.</p>

    <ul>
        <li>Leave Type: <span th:text="${leaveType}"></span></li>
        <li>Start Date: <span th:text="${startDate}"></span></li>
        <li>End Date: <span th:text="${endDate}"></span></li>
        <li>Reason: <span th:text="${reason}"></span></li>
    </ul>

    <p>The leave starts in <strong th:text="${daysUntilStart}"></strong> days. Please review and decide whether to approve or reject this application.</p>

    <p><a th:href="@{${leaveUrl}}" target="_blank">Click here to review</a></p>

    <p>Thank you,<br/>LAPS Notification System</p>
</body>
</html>
