<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::section})}">
<body>
<section th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card shadow-sm">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0"><i class="bi bi-calendar-plus"></i> Add Public Holiday</h5>
                </div>
                <div class="card-body">
                    <!-- Error message display (issue #43) -->
                    <div th:if="${#fields.hasErrors('holiday')}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle"></i>
                        <strong>Validation Error:</strong>
                        <ul class="mb-0 mt-2">
                            <li th:each="error : ${#fields.errors('holiday')}" th:text="${error}"></li>
                        </ul>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <form th:action="@{/admin/holidays/new}" th:object="${holiday}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Date <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" th:field="*{holidayDate}">
                            <div th:if="${#fields.hasErrors('holidayDate')}" class="text-danger small mt-1">
                                <span th:each="error : ${#fields.errors('holidayDate')}" th:text="${error}"></span>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Description <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{description}"
                                placeholder="e.g. National Day">
                            <div th:if="${#fields.hasErrors('description')}" class="text-danger small mt-1">
                                <span th:each="error : ${#fields.errors('description')}" th:text="${error}"></span>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-save"></i> Add Holiday
                            </button>
                            <a th:href="@{/admin/holidays}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
