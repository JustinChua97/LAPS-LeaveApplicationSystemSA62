<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::section})}">
<body>
<section th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-calendar2-check"></i> Leave Entitlements —
            <span th:text="${employee.name}"></span>
        </h4>
        <a th:href="@{/admin/employees}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Leave Type</th><th>Year</th>
                        <th>Total Days</th><th>Used Days</th><th>Remaining</th><th>Update</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ent : ${entitlements}">
                        <td th:text="${ent.leaveType.name}"></td>
                        <td th:text="${ent.year}"></td>
                        <td th:text="${ent.totalDays}"></td>
                        <td th:text="${ent.usedDays}"></td>
                        <td>
                            <span class="fw-bold"
                                  th:classappend="${ent.remainingDays <= 0} ? 'text-danger' : 'text-success'"
                                  th:text="${ent.remainingDays}"></span>
                        </td>
                        <td>
                            <div class="input-group input-group-sm" style="width:180px;">
                                <input type="number" class="form-control"
                                       th:id="'total-' + ${ent.id}"
                                       th:value="${ent.totalDays}" min="0" step="0.5">
                                <button type="button" class="btn btn-outline-warning"
                                        th:data-url="@{'/admin/entitlements/' + ${ent.id} + '/update'}"
                                        th:data-employee-id="${employee.id}"
                                        th:data-field="'total-' + ${ent.id}"
                                        onclick="updateEntitlement(this)">
                                    Save
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
    function updateEntitlement(btn) {
        const url = btn.getAttribute('data-url');
        const fieldId = btn.getAttribute('data-field');
        const empId = btn.getAttribute('data-employee-id');
        const total = document.getElementById(fieldId).value;
        const token = document.querySelector('meta[name="_csrf"]')?.getAttribute('content') || '';
        const body = '_csrf=' + encodeURIComponent(token)
                   + '&totalDays=' + encodeURIComponent(total)
                   + '&employeeId=' + encodeURIComponent(empId);
        const xhr = new XMLHttpRequest();
        xhr.open('POST', url, true);
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
        xhr.setRequestHeader('X-CSRF-TOKEN', token);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === XMLHttpRequest.DONE) { window.location.reload(); }
        };
        xhr.send(body);
    }
    </script>
</section>
</body>
</html>
