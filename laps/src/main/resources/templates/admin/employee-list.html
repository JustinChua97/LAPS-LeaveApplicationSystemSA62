<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::section})}">
<body>
<section th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-people"></i> Manage Employees</h4>
        <a th:href="@{/admin/employees/new}" class="btn btn-primary btn-sm">
            <i class="bi bi-person-plus"></i> Add Employee
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover table-sm mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Username</th><th>Name</th><th>Email</th>
                        <th>Role</th><th>Designation</th><th>Manager</th>
                        <th>Status</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="emp : ${employees}"
                        th:classappend="${!emp.active} ? 'table-secondary text-muted'">
                        <td th:text="${emp.username}"></td>
                        <td th:text="${emp.name}"></td>
                        <td th:text="${emp.email}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${emp.role.name() == 'ROLE_ADMIN'} ? 'bg-danger' : (${emp.role.name() == 'ROLE_MANAGER'} ? 'bg-primary' : 'bg-secondary')"
                                  th:text="${emp.role.name().replace('ROLE_','')}"></span>
                        </td>
                        <td th:text="${emp.designation != null ? emp.designation.name().replace('_',' ') : '-'}"></td>
                        <td th:text="${emp.manager != null ? emp.manager.name : '-'}"></td>
                        <td>
                            <span class="badge" th:classappend="${emp.active} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${emp.active} ? 'Active' : 'Inactive'"></span>
                        </td>
                        <td>
                            <a th:href="@{'/admin/employees/' + ${emp.id} + '/edit'}"
                               class="btn btn-xs btn-outline-warning btn-sm">Edit</a>
							   <a th:unless="${emp.role.name() == 'ROLE_ADMIN'}"
							      th:href="@{'/admin/employees/' + ${emp.id} + '/entitlements'}"
                               class="btn btn-xs btn-outline-info btn-sm">Entitlements</a>
                            <button type="button" class="btn btn-xs btn-outline-danger btn-sm"
                                    th:if="${emp.active and emp.role.name() != 'ROLE_ADMIN'}"
                                    th:data-url="@{'/admin/employees/' + ${emp.id} + '/deactivate'}"
                                    data-confirm="Deactivate this employee?"
                                    onclick="confirmPost(this)">Deactivate</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
