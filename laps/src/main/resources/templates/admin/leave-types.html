<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::section})}">
<body>
<section th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-list-check"></i> Leave Types</h4>
        <a th:href="@{/admin/leave-types/new}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-circle"></i> Add Leave Type
        </a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr><th>Name</th><th>Description</th><th>Max Days/Year</th><th>Half Day</th><th>Active</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="leaveType : ${leaveTypes}">
                        <td class="fw-semibold" th:text="${leaveType.name}"></td>
                        <td th:text="${leaveType.description}"></td>
                        <td th:text="${leaveType.maxDaysPerYear}"></td>
                        <td>
                            <i class="bi" th:classappend="${leaveType.halfDayAllowed} ? 'bi-check-circle-fill text-success' : 'bi-x-circle text-muted'"></i>
                        </td>
                        <td>
                            <i class="bi" th:classappend="${leaveType.active} ? 'bi-check-circle-fill text-success' : 'bi-x-circle text-muted'"></i>
                        </td>
                        <td>
                            <a th:href="@{'/admin/leave-types/' + ${leaveType.id} + '/edit'}"
                               class="btn btn-outline-warning btn-sm">Edit</a>
                            <button type="button" class="btn btn-outline-danger btn-sm"
                                    th:data-url="@{'/admin/leave-types/' + ${leaveType.id} + '/delete'}"
                                    data-confirm="Delete this leave type?"
                                    onclick="confirmPost(this)">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
