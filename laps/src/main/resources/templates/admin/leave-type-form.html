<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::section})}">
<body>
<section th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0" th:text="${leaveType.id != null} ? 'Edit Leave Type' : 'New Leave Type'"></h5>
                </div>
                <div class="card-body">
                    <form th:action="${leaveType.id != null} ? @{'/admin/leave-types/' + ${leaveType.id} + '/edit'} : @{/admin/leave-types/new}"
                          th:object="${leaveType}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="2"></textarea>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Max Days / Year</label>
                                <input type="number" class="form-control" th:field="*{maxDaysPerYear}" min="0">
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{halfDayAllowed}">
                                <label class="form-check-label">Half Day Allowed</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{active}">
                                <label class="form-check-label">Active</label>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Save
                            </button>
                            <a th:href="@{/admin/leave-types}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
