<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::section})}">
<body>
<section th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-calendar-event"></i> Public Holidays
            <span class="badge bg-secondary ms-1" th:text="${year}"></span>
        </h4>
        <div class="d-flex gap-2">
            <select class="form-select form-select-sm" style="width:120px;"
                    onchange="window.location='/admin/holidays?year='+this.value">
                <option th:each="y : ${#numbers.sequence(2024, 2030)}"
                        th:value="${y}" th:text="${y}"
                        th:selected="${y == year}"></option>
            </select>
            <a th:href="@{/admin/holidays/new}" class="btn btn-primary btn-sm">
                <i class="bi bi-plus-circle"></i> Add Holiday
            </a>
            <form th:action="@{/admin/holidays/sync}" method="post" class="d-inline">
            <input type="hidden" name="year" th:value="${year}" />
            <button type="submit" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-repeat"></i> Sync from API
            </button>
        </form>
        </div>
    </div>
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(holidays)}" class="p-4 text-center text-muted">
                No holidays defined for <span th:text="${year}"></span>.
            </div>
            <table class="table table-hover table-sm mb-0" th:unless="${#lists.isEmpty(holidays)}">
                <thead class="table-light">
                    <tr><th>Date</th><th>Day</th><th>Description</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="h : ${holidays}">
                        <td th:text="${h.holidayDate}"></td>
                        <td th:text="${h.holidayDate.dayOfWeek.getDisplayName(T(java.time.format.TextStyle).FULL, T(java.util.Locale).ENGLISH)}"></td>
                        <td th:text="${h.description}"></td>
                        <td>
                            <form method="POST" th:action="@{'/admin/holidays/' + ${h.id} + '/delete'}" style="display: inline;">
                                <button type="submit" class="btn btn-outline-danger btn-sm"
                                        onclick="return confirm('Delete this holiday?');">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
