<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::section})}">
<body>
<section th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0"><i class="bi bi-pencil-square"></i> Edit Employee:
                        <span th:text="${employee.name}"></span>
                    </h5>
                </div>
                <div class="card-body">
                    <form th:action="@{'/admin/employees/' + ${employee.id} + '/edit'}"
                          th:object="${employeeForm}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Full Name</label>
                                <input type="text" class="form-control" th:field="*{name}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" class="form-control" th:field="*{email}" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Role</label>
                                <select class="form-select" th:field="*{role}" id="roleSelect">
                                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r.name().replace('ROLE_','')}"></option>
                                </select>
                            </div>
                            <div class="col-md-4" id="designationContainer">
                                <label class="form-label fw-semibold">Designation</label>
								<select class="form-select" th:field="*{designation}" id="designationSelect">
								    <option value="">-- None --</option>
                                    <option th:each="d : ${designations}" th:value="${d}" th:text="${d.name().replace('_',' ')}"></option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Manager</label>
                                 <select class="form-select" name="managerId">
                                    <option value="">-- None --</option>
									<option th:each="m : ${managers}"
									        th:value="${m.id}"
									        th:text="${m.name}"
									        th:selected="${employee.manager != null && employee.manager.id == m.id}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{active}">
                                <label class="form-check-label">Active</label>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-save"></i> Save Changes
                            </button>
                            <a th:href="@{/admin/employees}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
	<script th:inline="none">
	    document.addEventListener('DOMContentLoaded', function () {
	        var roleSelect = document.getElementById('roleSelect');
	        var designationContainer = document.getElementById('designationContainer');
	        var designationSelect = document.getElementById('designationSelect');
	        function toggleDesignation() {
	            var isAdmin = roleSelect.value === 'ROLE_ADMIN';
	            designationContainer.style.display = isAdmin ? 'none' : '';
	            if (isAdmin) { designationSelect.value = ''; }
	        }
	        roleSelect.addEventListener('change', toggleDesignation);
	        toggleDesignation();
	    });
	</script>
</section>
</body>
</html>
