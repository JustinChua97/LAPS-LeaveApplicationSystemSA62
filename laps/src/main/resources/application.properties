# Application
spring.application.name=LAPS - Leave Application Processing System
server.port=8080

# PostgreSQL Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Initialize data
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:sql/data.sql
spring.jpa.defer-datasource-initialization=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Mail (credentials injected via environment variables)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Required for Mailtrap sandbox STARTTLS handshake on port 2525 (ASVS V9.2.1).
# Override via MAIL_SMTP_SSL_TRUST env var if a different SMTP provider is used.
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:sandbox.smtp.mailtrap.io}
# Refuse cleartext fallback if server does not advertise STARTTLS (ASVS V9.1.2)
spring.mail.properties.mail.smtp.starttls.required=true

# Logging
logging.level.com.iss.laps=DEBUG
logging.level.org.springframework.security=INFO

# Application base URL (used in email links; defaults to localhost for local dev)
app.base-url=${EC2_HOST:localhost}

# Seed user password (injected via environment variable).
# Named app.seed.password (not seed.user.password) so the SEED_USER_PASSWORD OS env var
# cannot relax-bind to it and override the test profile value in application-test.properties.
app.seed.password=${SEED_USER_PASSWORD}

# Pagination default
laps.pagination.default-size=10

# JWT (stateless REST API auth — issue #6)
# Secret must be >= 256 bits; injected via JWT_SECRET env var — never hardcoded
app.jwt.secret=${JWT_SECRET}
# 15 minutes in milliseconds
app.jwt.expiration-ms=900000

# HTTPS proxy support (issue #9)
# nginx terminates TLS and forwards to port 8080; Spring Boot must trust proxy headers.
# server.forward-headers-strategy=NATIVE is safe only because port 8080 is
# firewall-restricted to localhost — never expose 8080 publicly (ASVS V13.2.6).
# server.servlet.session.cookie.secure=true ensures JSESSIONID is only sent over
# HTTPS, preventing session cookie theft over plaintext HTTP (ASVS V3.4.1).
server.forward-headers-strategy=NATIVE
server.servlet.session.cookie.secure=true
