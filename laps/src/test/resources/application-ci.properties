# CI profile — uses PostgreSQL service container (GitHub Actions)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/lapsdb}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:sql/data.sql
spring.jpa.defer-datasource-initialization=true

# Disable async mail sending in CI tests
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.async.mail.enabled=false

app.seed.password=${SEED_USER_PASSWORD}

# JWT (injected via GitHub Actions secret)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=900000
