# Test profile — uses in-memory H2 so no PostgreSQL needed for unit/integration tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=YEAR
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:sql/data.sql
spring.jpa.defer-datasource-initialization=true

# Disable async mail sending in tests
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=
spring.mail.password=

# Test-only seed password (not used in production)
seed.user.password=test-seed-password
