# LAPS Docker Compose — issue #34
#
# Services:
#   postgres  — PostgreSQL 16 database (named volume for persistence)
#   laps-app  — Spring Boot application (ECR image, internal bridge only)
#   nginx     — Reverse proxy with TLS termination (ports 80/443 on host)
#
# Required before running:
#   - /opt/laps/.env          — app secrets (DB_USERNAME, DB_PASSWORD, JWT_SECRET, etc.)
#   - /opt/laps/nginx/nginx.conf — rendered from docker/nginx/nginx.conf.template
#   - /opt/laps/ssl/server.crt + server.key — generated by setup-nginx-https.sh
#
# LAPS_IMAGE must be exported before running docker compose:
#   export LAPS_IMAGE=<ecr-url>/laps:<sha>
#   docker compose pull && docker compose up -d --remove-orphans --wait

services:
  postgres:
    container_name: laps-postgres-1
    image: postgres:16-alpine
    # DB credentials read from /opt/laps/.env via compose interpolation
    environment:
      POSTGRES_DB: lapsdb
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d lapsdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - laps-net

  laps-app:
    container_name: laps-app-1
    image: ${LAPS_IMAGE}
    # Secrets injected at runtime — never baked into image (ASVS V8.3.4)
    env_file: /opt/laps/.env
    # Expose port to Docker bridge only — NOT mapped to host (ASVS V1.14.6)
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/login"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: on-failure:3
    networks:
      - laps-net

  nginx:
    container_name: laps-nginx-1
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # nginx config rendered from template at deploy time
      - /opt/laps/nginx/nginx.conf:/etc/nginx/conf.d/laps.conf:ro
      # TLS certs generated by setup-nginx-https.sh
      - /opt/laps/ssl:/opt/laps/ssl:ro
    depends_on:
      laps-app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - laps-net

networks:
  laps-net:
    driver: bridge

volumes:
  postgres-data:
