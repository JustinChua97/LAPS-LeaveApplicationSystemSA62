name: Issue Security Triage

on:
  issues:
    types: [opened, edited]

jobs:
  check-security-fields:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check trust boundary selection
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const issueNumber = context.issue.number;

            // Check whether the issue was created from the feature_request template
            // by looking for the trust boundaries section header
            const isFeatureRequest = body.includes('Trust Boundaries Affected');
            if (!isFeatureRequest) {
              // Not a feature request template — skip triage
              return;
            }

            // GitHub renders checked checkboxes as "- [x]" and unchecked as "- [ ]"
            const hasCheckedBoundary = body.includes('- [x]');

            if (!hasCheckedBoundary) {
              // Add blocking label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['blocked-missing-security-analysis']
              });

              // Remove backlog-candidate label if present (don't let it slip through)
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: 'backlog-candidate'
                });
              } catch (e) {
                // Label may not exist — ignore
              }

              // Post a comment instructing the author to fix the issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: [
                  '## :lock: Security Triage Required',
                  '',
                  'This issue is missing a required **Trust Boundaries Affected** selection.',
                  '',
                  'Please edit the issue and check at least one trust boundary that this feature crosses.',
                  'This field is required before the issue can enter the sprint backlog.',
                  '',
                  'Refer to [REQUIREMENTS_TEMPLATE.md](../../blob/main/REQUIREMENTS_TEMPLATE.md) for guidance on completing the security fields.'
                ].join('\n')
              });

              core.warning(`Issue #${issueNumber} is missing trust boundary selection — labelled blocked-missing-security-analysis`);
            } else {
              // Trust boundaries checked — remove blocking label if it exists
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: 'blocked-missing-security-analysis'
                });
                core.info(`Issue #${issueNumber} now has trust boundaries — removed blocked-missing-security-analysis`);
              } catch (e) {
                // Label was not present — nothing to remove
              }
            }
