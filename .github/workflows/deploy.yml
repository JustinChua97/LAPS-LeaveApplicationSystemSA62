name: CD - Deploy to AWS EC2

on:
  workflow_run:
    workflows: [ "CI - Build, Test and Security Scan" ]
    types: [ completed ]
    branches: [ main ]
  workflow_dispatch:
    inputs:
      image_sha:
        description: 'Git SHA of the ECR image to deploy (must already be pushed by CI)'
        required: true

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to EC2 via Docker Compose
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve ECR repository URL and image SHA
        id: image
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          DISPATCH_SHA: ${{ inputs.image_sha }}
        run: |
          # Derive the ECR URL from the AWS account ID and region — no Terraform output needed at deploy time
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URL="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/laps"
          echo "ecr_url=${ECR_URL}" >> "$GITHUB_OUTPUT"

          # workflow_run: use SHA from the CI run that built the image
          # workflow_dispatch: use the explicitly provided image_sha input
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            SHA="$WORKFLOW_RUN_SHA"
          else
            SHA="$DISPATCH_SHA"
          fi
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${ECR_URL}:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Add EC2 host to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Install Docker and Docker Compose plugin on EC2 (idempotent)
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash << 'REMOTE'
            set -e
            if ! command -v docker &>/dev/null; then
              echo "Installing Docker..."
              sudo dnf install -y docker
              sudo systemctl enable --now docker
              sudo usermod -aG docker "$USER"
            fi
            if ! docker compose version &>/dev/null; then
              echo "Installing Docker Compose V2 plugin..."
              # docker-compose-plugin is not in Amazon Linux 2023 repos — install binary directly
              COMPOSE_VERSION="v2.35.0"
              PLUGIN_DIR="/usr/local/lib/docker/cli-plugins"
              sudo mkdir -p "${PLUGIN_DIR}"
              sudo curl -fsSL \
                "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-x86_64" \
                -o "${PLUGIN_DIR}/docker-compose"
              sudo chmod +x "${PLUGIN_DIR}/docker-compose"
            fi
            echo "Docker $(docker --version), Compose $(docker compose version --short)"
          REMOTE

      - name: Stop legacy systemd services (laps + nginx) if running
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash << 'REMOTE'
            sudo systemctl stop    laps  2>/dev/null || true
            sudo systemctl disable laps  2>/dev/null || true
            sudo systemctl stop    nginx 2>/dev/null || true
            sudo systemctl disable nginx 2>/dev/null || true
          REMOTE

      - name: Write environment file on EC2
        run: |
          cat > /tmp/laps.env << 'EOF'
          DB_URL=${{ secrets.DB_URL }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          MAIL_HOST=${{ secrets.MAIL_HOST }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          SEED_USER_PASSWORD=${{ secrets.SEED_USER_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOF
          sed -i 's/^[[:space:]]*//' /tmp/laps.env
          scp /tmp/laps.env ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/laps.env
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo mkdir -p /opt/laps && sudo mv /tmp/laps.env /opt/laps/.env && sudo chmod 600 /opt/laps/.env"
          rm /tmp/laps.env

      - name: Ensure PostgreSQL is installed and configured on EC2
        run: |
          cat > /tmp/db_setup.sh << 'EOF'
          #!/bin/bash
          set -e
          DB_USER="${{ secrets.DB_USERNAME }}"
          DB_PASS="${{ secrets.DB_PASSWORD }}"
          DB_NAME="lapsdb"

          if ! command -v psql &> /dev/null; then
            echo "PostgreSQL not found, installing..."
            sudo dnf install -y postgresql15-server
            sudo postgresql-setup --initdb
            echo "PostgreSQL installed."
          else
            echo "PostgreSQL already installed."
          fi

          PG_HBA=$(sudo find /var/lib/pgsql -name pg_hba.conf 2>/dev/null | head -1)
          sudo sed -i 's/^\(local\s\+all\s\+all\s\+\)ident/\1md5/' "$PG_HBA"
          sudo sed -i 's/^\(host\s\+all\s\+all\s\+127\.0\.0\.1\/32\s\+\)ident/\1md5/' "$PG_HBA"
          sudo sed -i 's/^\(host\s\+all\s\+all\s\+::1\/128\s\+\)ident/\1md5/' "$PG_HBA"

          sudo systemctl enable postgresql
          sudo systemctl restart postgresql

          sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='${DB_USER}'" | grep -q 1 \
            || sudo -u postgres psql -c "CREATE USER \"${DB_USER}\" WITH PASSWORD '${DB_PASS}';"
          sudo -u postgres psql -c "ALTER USER \"${DB_USER}\" WITH PASSWORD '${DB_PASS}';"

          sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='${DB_NAME}'" | grep -q 1 \
            || sudo -u postgres psql -c "CREATE DATABASE \"${DB_NAME}\" OWNER \"${DB_USER}\";"

          echo "Database setup complete: ${DB_NAME}"
          EOF
          sed -i 's/^[[:space:]]*//' /tmp/db_setup.sh
          scp /tmp/db_setup.sh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/db_setup.sh
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "bash /tmp/db_setup.sh && rm /tmp/db_setup.sh"
          rm /tmp/db_setup.sh

      - name: Generate TLS certificate on EC2
        run: |
          scp scripts/setup-nginx-https.sh \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/setup-nginx-https.sh
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "bash /tmp/setup-nginx-https.sh '${{ secrets.EC2_HOST }}' && rm /tmp/setup-nginx-https.sh"

      - name: Render nginx config from template on EC2
        run: |
          scp docker/nginx/nginx.conf.template \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/nginx.conf.template
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash << REMOTE
            set -e
            sudo mkdir -p /opt/laps/nginx
            NGINX_HOST='${{ secrets.EC2_HOST }}' \
              envsubst '\${NGINX_HOST}' < /tmp/nginx.conf.template \
              | sudo tee /opt/laps/nginx/nginx.conf > /dev/null
            sudo chmod 644 /opt/laps/nginx/nginx.conf
            rm /tmp/nginx.conf.template
          REMOTE

      - name: Copy docker-compose.yml to EC2
        run: |
          scp docker-compose.yml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/laps/docker-compose.yml

      - name: Log in to ECR on EC2 and deploy
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash << REMOTE
            set -e

            # Authenticate Docker to ECR using runner's AWS credentials
            AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}' \
            AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}' \
            AWS_SESSION_TOKEN='${{ secrets.AWS_SESSION_TOKEN }}' \
            AWS_DEFAULT_REGION='${{ vars.AWS_REGION }}' \
              aws ecr get-login-password --region '${{ vars.AWS_REGION }}' \
              | docker login --username AWS --password-stdin '${{ steps.image.outputs.ecr_url }}'

            # Pull new image
            docker pull '${{ steps.image.outputs.image }}'

            # Deploy via Compose — export so Docker Compose picks it up for ${LAPS_IMAGE} interpolation
            export LAPS_IMAGE='${{ steps.image.outputs.image }}'
            cd /opt/laps
            docker compose pull
            docker compose up -d --remove-orphans
          REMOTE

      - name: Health check
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash << 'REMOTE'
            set -e
            echo "Waiting for application to become healthy..."
            for i in $(seq 1 12); do
              sleep 5
              if docker compose -f /opt/laps/docker-compose.yml ps laps-app | grep -q "Up"; then
                if curl -sf http://localhost:8080/login > /dev/null 2>&1; then
                  echo "Health check passed (attempt ${i})"
                  exit 0
                fi
              fi
            done
            echo "ERROR: Application did not become healthy in 60s"
            docker compose -f /opt/laps/docker-compose.yml logs --tail=50
            exit 1
          REMOTE

      - name: Print deployment summary
        run: |
          echo "Deployed ${{ steps.image.outputs.image }}"
          echo "App: https://${{ secrets.EC2_HOST }}"
          echo "(Self-signed certificate — browser will show a security warning)"
