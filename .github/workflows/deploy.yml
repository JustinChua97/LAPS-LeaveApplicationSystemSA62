name: CD - Deploy to AWS EC2

on:
  workflow_dispatch:
  workflow_run:
    workflows: [ "CI - Build, Test and Security Scan" ]
    types: [ completed ]
    branches: [ main ]

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read
      contents: read

    steps:
      - name: Download JAR artifact from CI run
        if: github.event_name == 'workflow_run'
        uses: dawidd6/action-download-artifact@v6
        with:
          name: laps-jar
          path: ./deploy
          workflow: ci.yml
          run_id: ${{ github.event.workflow_run.id }}

      - name: Checkout code (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Set up Java 17 (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        working-directory: laps
        run: mvn -B package -DskipTests

      - name: Prepare deploy dir (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p ./deploy
          cp laps/target/laps-*.jar ./deploy/
          rm -f ./deploy/*.jar.original

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Add EC2 host to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.EC2_KNOWN_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Copy JAR to EC2
        run: |
          set -e
          jar_file=$(ls ./deploy/laps-*.jar | grep -v '\.jar\.original$')
          count=$(echo "$jar_file" | wc -l | tr -d ' ')
          if [ "$count" -ne 1 ]; then
            echo "ERROR: Expected exactly one JAR to deploy, found $count: $jar_file"
            exit 1
          fi
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "sudo mkdir -p /opt/laps && sudo chown ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} /opt/laps"
          scp "$jar_file" ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/laps/laps-new.jar

      - name: Write environment file on EC2
        run: |
          cat > /tmp/laps.env << 'EOF'
          DB_URL=${{ secrets.DB_URL }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          MAIL_HOST=${{ secrets.MAIL_HOST }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          SEED_USER_PASSWORD=${{ secrets.SEED_USER_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOF
          sed -i 's/^[[:space:]]*//' /tmp/laps.env
          scp /tmp/laps.env ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/laps.env
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "sudo mv /tmp/laps.env /opt/laps/.env && sudo chmod 600 /opt/laps/.env"
          rm /tmp/laps.env

      - name: Ensure PostgreSQL is installed and configured on EC2
        run: |
          cat > /tmp/db_setup.sh << 'EOF'
          #!/bin/bash
          set -e
          DB_USER="${{ secrets.DB_USERNAME }}"
          DB_PASS="${{ secrets.DB_PASSWORD }}"
          DB_NAME="lapsdb"

          if ! command -v psql &> /dev/null; then
            echo "PostgreSQL not found, installing..."
            sudo dnf install -y postgresql15-server
            sudo postgresql-setup --initdb
            echo "PostgreSQL installed."
          else
            echo "PostgreSQL already installed."
          fi

          # Switch authentication to md5 so the app can login with password
          PG_HBA=$(sudo find /var/lib/pgsql -name pg_hba.conf 2>/dev/null | head -1)
          sudo sed -i 's/^\(local\s\+all\s\+all\s\+\)ident/\1md5/' "$PG_HBA"
          sudo sed -i 's/^\(host\s\+all\s\+all\s\+127\.0\.0\.1\/32\s\+\)ident/\1md5/' "$PG_HBA"
          sudo sed -i 's/^\(host\s\+all\s\+all\s\+::1\/128\s\+\)ident/\1md5/' "$PG_HBA"

          sudo systemctl enable postgresql
          sudo systemctl restart postgresql

          sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='${DB_USER}'" | grep -q 1 \
            || sudo -u postgres psql -c "CREATE USER \"${DB_USER}\" WITH PASSWORD '${DB_PASS}';"
          sudo -u postgres psql -c "ALTER USER \"${DB_USER}\" WITH PASSWORD '${DB_PASS}';"

          sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='${DB_NAME}'" | grep -q 1 \
            || sudo -u postgres psql -c "CREATE DATABASE \"${DB_NAME}\" OWNER \"${DB_USER}\";"

          echo "Database setup complete: ${DB_NAME}"
          EOF
          sed -i 's/^[[:space:]]*//' /tmp/db_setup.sh
          scp /tmp/db_setup.sh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/db_setup.sh
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "bash /tmp/db_setup.sh && rm /tmp/db_setup.sh"
          rm /tmp/db_setup.sh

      - name: Ensure systemd service exists on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash << 'REMOTE_SCRIPT'
            set -e
            printf '[Unit]\nDescription=LAPS Spring Boot Application\nAfter=network.target\n\n[Service]\nUser=ec2-user\nEnvironmentFile=/opt/laps/.env\nExecStart=/usr/bin/java -jar /opt/laps/laps.jar\nRestart=on-failure\nRestartSec=10\nStandardOutput=journal\nStandardError=journal\n\n[Install]\nWantedBy=multi-user.target\n' \
              | sudo tee /etc/systemd/system/laps.service > /dev/null
            sudo systemctl daemon-reload
            sudo systemctl enable laps
          REMOTE_SCRIPT

      - name: Configure nginx HTTPS on EC2
        run: |
          scp scripts/setup-nginx-https.sh \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/setup-nginx-https.sh
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "bash /tmp/setup-nginx-https.sh '${{ secrets.EC2_HOST }}' \
             && rm /tmp/setup-nginx-https.sh"

      - name: Restart application on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'REMOTE_SCRIPT'
            set -e
            mv /opt/laps/laps-new.jar /opt/laps/laps.jar
            sudo systemctl restart laps
            echo "Waiting for application to start..."
            for i in $(seq 1 12); do
              sleep 5
              if systemctl is-active --quiet laps; then
                if curl -sf http://localhost:8080/login > /dev/null 2>&1; then
                  echo "Health check passed"
                  exit 0
                fi
              fi
            done
            echo "ERROR: Application did not become healthy in 60s"
            sudo journalctl -u laps -n 50 --no-pager
            exit 1
          REMOTE_SCRIPT

      - name: Print deployment summary
        run: |
          echo "Deployed to https://${{ secrets.EC2_HOST }}"
          echo "(Self-signed certificate — browser will show a security warning; click Advanced -> Proceed)"
