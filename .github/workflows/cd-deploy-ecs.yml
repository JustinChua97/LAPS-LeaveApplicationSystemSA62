name: CD - Deploy to ECS Fargate

# On every push to main (after CI passes) this workflow:
#   1. Provisions ECS infrastructure if it does not yet exist (first run only)
#   2. Registers a new task definition revision with the new image SHA
#   3. Updates the ECS service and waits for it to stabilise
#
# Required GitHub Variables (Settings → Variables):
#   AWS_REGION   — e.g. us-east-1
#   VPC_ID       — VPC ID (only needed on first run, ignored once service is ACTIVE)
#   SUBNET_IDS   — Two public subnet IDs, comma-separated (first run only)
#
# Required GitHub Secrets (Settings → Secrets):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN
#   RDS_ENDPOINT, DB_USERNAME, DB_PASSWORD
#   JWT_SECRET, SEED_USER_PASSWORD
#   MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD

on:
  workflow_run:
    workflows: [ "CI - Build, Test, Scan and Push to ECR" ]
    types: [ completed ]
    branches: [ main ]
  workflow_dispatch:
    inputs:
      image_sha:
        description: 'Git SHA of the ECR image to deploy (must already be pushed by CI)'
        required: true

concurrency:
  group: deploy-ecs
  cancel-in-progress: true

jobs:
  deploy:
    name: Setup (if needed) and Deploy to ECS Fargate
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install jq
        run: sudo apt-get install -y --no-install-recommends jq

      - name: Resolve ECR image URI
        id: image
        env:
          AWS_REGION:       ${{ vars.AWS_REGION }}
          EVENT_NAME:       ${{ github.event_name }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          DISPATCH_SHA:     ${{ inputs.image_sha }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URL="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/laps"
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            SHA="$WORKFLOW_RUN_SHA"
          else
            SHA="$DISPATCH_SHA"
          fi
          echo "image=${ECR_URL}:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Provision ECS infrastructure (first run only — skipped if service is ACTIVE)
        env:
          VPC_ID:             ${{ vars.VPC_ID }}
          SUBNET_IDS:         ${{ vars.SUBNET_IDS }}
          AWS_REGION:         ${{ vars.AWS_REGION }}
          DB_URL:             jdbc:postgresql://${{ secrets.RDS_ENDPOINT }}/lapsdb
          DB_USERNAME:        ${{ secrets.DB_USERNAME }}
          DB_PASSWORD:        ${{ secrets.DB_PASSWORD }}
          JWT_SECRET:         ${{ secrets.JWT_SECRET }}
          SEED_USER_PASSWORD: ${{ secrets.SEED_USER_PASSWORD }}
          MAIL_HOST:          ${{ secrets.MAIL_HOST }}
          MAIL_PORT:          ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME:      ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD:      ${{ secrets.MAIL_PASSWORD }}
        run: |
          STATUS=$(aws ecs describe-services \
            --cluster laps --services laps-service \
            --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          if [ "$STATUS" = "ACTIVE" ]; then
            echo "ECS service is ACTIVE — skipping first-time setup."
          else
            echo "ECS service not found — running first-time setup..."
            bash scripts/setup-ecs.sh
          fi

      - name: Register new ECS task definition revision with updated image
        id: task-def
        run: |
          NEW_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition laps-task \
            --query taskDefinition \
            --output json \
          | jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)
                | .containerDefinitions[0].image = "${{ steps.image.outputs.image }}"')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "arn=${NEW_ARN}" >> "$GITHUB_OUTPUT"

      - name: Update ECS service with new task definition
        run: |
          aws ecs update-service \
            --cluster laps \
            --service laps-service \
            --task-definition ${{ steps.task-def.outputs.arn }} \
            --force-new-deployment

      - name: Wait for service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster laps \
            --services laps-service

      - name: Print deployment summary
        run: |
          echo "Deployed: ${{ steps.image.outputs.image }}"
          echo "Task def: ${{ steps.task-def.outputs.arn }}"
